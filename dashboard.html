<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flashcard Deck Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
    header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 18px; font-weight: 600; }
    header h1 span { margin-right: 8px; }
    .actions { display: flex; gap: 10px; align-items: center; }
    button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 14px; font-size: 13px; font-weight: 500; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-secondary { background: #f0f0f0; color: #333; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #e5e5e5; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    main { padding: 24px; max-width: 1100px; margin: 0 auto; }
    #status { text-align: center; padding: 60px 20px; color: #888; font-size: 15px; }
    #status.error { color: #ef4444; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    thead th { background: #f9f9f9; padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: #666; border-bottom: 1px solid #eee; }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    td { padding: 12px 16px; font-size: 14px; vertical-align: middle; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 500; }
    .tag-student { background: #dbeafe; color: #1d4ed8; }
    .tag-lesson { background: #fef3c7; color: #92400e; }
    a.deck-link { color: #2563eb; text-decoration: none; font-size: 13px; }
    a.deck-link:hover { text-decoration: underline; }
    .vocab-list { font-size: 12px; color: #666; max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .audio-badge { font-size: 12px; color: #059669; font-weight: 500; }
    .no-audio { font-size: 12px; color: #aaa; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #fff; border-radius: 12px; padding: 28px; width: 440px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,.18); }
    .modal h2 { font-size: 17px; margin-bottom: 8px; }
    .modal p { font-size: 14px; color: #555; margin-bottom: 18px; line-height: 1.5; }
    .modal input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; font-family: monospace; margin-bottom: 16px; outline: none; }
    .modal input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
    .modal .row { display: flex; gap: 10px; justify-content: flex-end; }
    .modal-error { color: #ef4444; font-size: 13px; margin-bottom: 10px; display: none; }
  </style>
</head>
<body>

<header>
  <h1><span>🗂</span>Flashcard Deck Manager</h1>
  <div class="actions">
    <button class="btn-secondary" onclick="loadData()">↻ Refresh</button>
    <button class="btn-primary" onclick="pushChanges()">Push to GitHub ↑</button>
  </div>
</header>

<main>
  <div id="status">Loading…</div>
  <div id="table-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>Student</th>
          <th>Lesson #</th>
          <th>Date</th>
          <th>Flashcard Deck</th>
          <th>Vocab</th>
          <th>Audio</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<!-- Token modal (only shown when pushing) -->
<div class="modal-overlay" id="token-modal">
  <div class="modal">
    <h2>🔑 GitHub Token Required</h2>
    <p>Enter a Personal Access Token with <strong>repo</strong> scope to push changes to GitHub. It will be saved in your browser for next time.</p>
    <input type="password" id="token-input" placeholder="ghp_…" autocomplete="off"/>
    <div class="modal-error" id="token-error"></div>
    <div class="row">
      <button class="btn-secondary" onclick="closeTokenModal()">Cancel</button>
      <button class="btn-primary" onclick="submitToken()">Save &amp; Push</button>
    </div>
  </div>
</div>

<script>
  const GH_OWNER  = 'nicc122';
  const GH_REPO   = 'flashcards';
  const GH_BRANCH = 'main';
  const GH_FILE   = 'lesson-store.json';
  const TOKEN_KEY  = 'gh_pat';

  const RAW_URL = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${GH_FILE}`;
  const API_URL = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

  let storeData   = null;
  let originalSha = null;
  let tokenResolve = null;

  // ── Load ──────────────────────────────────────────────
  async function loadData() {
    setStatus('Loading…');
    try {
      const res = await fetch(RAW_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      storeData = await res.json();
      renderTable(storeData);
      // Fetch SHA in background (needed for push, not for display)
      fetchSha().catch(() => {});
    } catch (err) {
      setStatus(`Failed to load: ${err.message}`, true);
    }
  }

  async function fetchSha() {
    const token = localStorage.getItem(TOKEN_KEY);
    const headers = { 'Accept': 'application/vnd.github+json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const r = await fetch(API_URL, { headers });
    if (r.ok) {
      const j = await r.json();
      originalSha = j.sha;
    }
  }

  // ── Render ────────────────────────────────────────────
  function renderTable(data) {
    const lessons = (data.lessons || []).slice().reverse();
    if (lessons.length === 0) {
      setStatus('No lessons found in store.');
      return;
    }
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';
    lessons.forEach((l, idx) => {
      const date = l.sessionId ? new Date(l.sessionId).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }) : '—';
      const vocabTerms = (l.vocab || []).map(v => v.term).join(', ');
      const audioName  = l.audioPath ? l.audioPath.split('/').pop() : null;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><span class="tag tag-student">${esc(l.student || '—')}</span></td>
        <td><span class="tag tag-lesson">Lesson ${esc(String(l.lessonNum ?? '—'))}</span></td>
        <td>${date}</td>
        <td>${l.flashcardUrl
          ? `<a class="deck-link" href="${esc(l.flashcardUrl)}" target="_blank">Open deck ↗</a>`
          : '<span style="color:#aaa;font-size:13px">—</span>'}</td>
        <td><div class="vocab-list" title="${esc(vocabTerms)}">${vocabTerms ? esc(vocabTerms) : '<span style="color:#aaa">—</span>'}</div></td>
        <td>${audioName
          ? `<span class="audio-badge">🎵 ${esc(audioName)}</span>`
          : '<span class="no-audio">—</span>'}</td>
        <td><button class="btn-danger" style="font-size:12px;padding:5px 10px" onclick="deleteEntry(${lessons.length - 1 - idx})">Delete</button></td>
      `;
      tbody.appendChild(tr);
    });
    document.getElementById('table-wrap').style.display = 'block';
    document.getElementById('status').style.display = 'none';
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function setStatus(msg, isError) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = isError ? 'error' : '';
    el.style.display = 'block';
    document.getElementById('table-wrap').style.display = 'none';
  }

  // ── Delete ────────────────────────────────────────────
  function deleteEntry(index) {
    if (!storeData) return;
    const entry = storeData.lessons[index];
    if (!confirm(`Delete entry for ${entry.student || '?'} Lesson ${entry.lessonNum ?? '?'}?\n\nThis will be saved when you push to GitHub.`)) return;
    storeData.lessons.splice(index, 1);
    renderTable(storeData);
  }

  // ── Push ──────────────────────────────────────────────
  async function pushChanges() {
    if (!storeData) { alert('No data loaded.'); return; }

    let token = localStorage.getItem(TOKEN_KEY) || '';
    if (!token) {
      token = await promptForToken();
      if (!token) return;
    }

    // Fetch SHA if we don't have it yet
    if (!originalSha) {
      try {
        const r = await fetch(API_URL, { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github+json' } });
        if (r.ok) { const j = await r.json(); originalSha = j.sha; }
      } catch(e) {}
    }

    await doPush(token);
  }

  async function doPush(token) {
    try {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify(storeData, null, 2))));
      const body = { message: 'dashboard: update lesson-store.json', content, branch: GH_BRANCH };
      if (originalSha) body.sha = originalSha;

      const res = await fetch(API_URL, {
        method: 'PUT',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json' },
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        if (res.status === 401) {
          localStorage.removeItem(TOKEN_KEY);
          document.getElementById('token-error').textContent = 'Token invalid or expired. Enter a new one.';
          document.getElementById('token-error').style.display = 'block';
          const token2 = await promptForToken();
          if (token2) await doPush(token2);
          return;
        }
        throw new Error(err.message || `HTTP ${res.status}`);
      }

      const j = await res.json();
      originalSha = j.content.sha;
      localStorage.setItem(TOKEN_KEY, token);
      alert('✅ Pushed to GitHub successfully!');
    } catch (err) {
      alert('Push failed: ' + err.message);
    }
  }

  // ── Token modal ───────────────────────────────────────
  function promptForToken() {
    return new Promise(resolve => {
      tokenResolve = resolve;
      document.getElementById('token-input').value = '';
      document.getElementById('token-error').style.display = 'none';
      document.getElementById('token-modal').classList.add('open');
      document.getElementById('token-input').focus();
    });
  }

  function submitToken() {
    const val = document.getElementById('token-input').value.trim();
    if (!val) { document.getElementById('token-error').textContent = 'Please enter a token.'; document.getElementById('token-error').style.display = 'block'; return; }
    document.getElementById('token-modal').classList.remove('open');
    if (tokenResolve) { tokenResolve(val); tokenResolve = null; }
  }

  function closeTokenModal() {
    document.getElementById('token-modal').classList.remove('open');
    if (tokenResolve) { tokenResolve(null); tokenResolve = null; }
  }

  document.getElementById('token-input').addEventListener('keydown', e => { if (e.key === 'Enter') submitToken(); });

  // ── Init ──────────────────────────────────────────────
  loadData();
</script>
</body>
</html>
